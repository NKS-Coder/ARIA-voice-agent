<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" font-family="Segoe UI, Arial, sans-serif">
  <!-- Background -->
  <rect width="1400" height="900" fill="#0b1220"/>

  <!-- Title -->
  <text x="700" y="48" text-anchor="middle" font-size="28" font-weight="700" fill="#f8fafc">ARIA — Voice AI Agent · System Architecture</text>
  <text x="700" y="74" text-anchor="middle" font-size="14" fill="#94a3b8">Browser-based voice assistant · Groq LLM · ElevenLabs TTS · Cloudflare Worker proxy</text>

  <!-- Defs: arrow markers -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#38bdf8"/>
    </marker>
    <marker id="arrowOrange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f97316"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10b981"/>
    </marker>
    <marker id="arrowPurple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#a78bfa"/>
    </marker>
  </defs>

  <!-- =================== USER =================== -->
  <g>
    <circle cx="120" cy="450" r="55" fill="#1e293b" stroke="#38bdf8" stroke-width="2.5"/>
    <text x="120" y="445" text-anchor="middle" font-size="36">👤</text>
    <text x="120" y="475" text-anchor="middle" font-size="14" font-weight="600" fill="#f8fafc">User</text>
  </g>

  <!-- =================== BROWSER LAYER =================== -->
  <g>
    <rect x="240" y="140" width="360" height="620" rx="14" fill="#0f172a" stroke="#a78bfa" stroke-width="2"/>
    <text x="420" y="170" text-anchor="middle" font-size="16" font-weight="700" fill="#c4b5fd">🌐 Browser  (GitHub Pages)</text>
    <text x="420" y="190" text-anchor="middle" font-size="12" fill="#94a3b8">index.html · single-page app</text>

    <!-- Mic -->
    <rect x="270" y="215" width="140" height="60" rx="8" fill="#1e293b" stroke="#a78bfa"/>
    <text x="340" y="240" text-anchor="middle" font-size="13" font-weight="600" fill="#e2e8f0">🎙️ Microphone</text>
    <text x="340" y="258" text-anchor="middle" font-size="11" fill="#94a3b8">getUserMedia()</text>

    <!-- Wake word -->
    <rect x="430" y="215" width="140" height="60" rx="8" fill="#1e293b" stroke="#a78bfa"/>
    <text x="500" y="240" text-anchor="middle" font-size="13" font-weight="600" fill="#e2e8f0">Wake Word</text>
    <text x="500" y="258" text-anchor="middle" font-size="11" fill="#94a3b8">"Hey ARIA"</text>

    <!-- STT -->
    <rect x="270" y="295" width="300" height="60" rx="8" fill="#1e293b" stroke="#a78bfa"/>
    <text x="420" y="320" text-anchor="middle" font-size="13" font-weight="600" fill="#e2e8f0">Web Speech API · Speech-to-Text</text>
    <text x="420" y="340" text-anchor="middle" font-size="11" fill="#94a3b8">SpeechRecognition → transcript</text>

    <!-- UI -->
    <rect x="270" y="375" width="300" height="60" rx="8" fill="#1e293b" stroke="#a78bfa"/>
    <text x="420" y="400" text-anchor="middle" font-size="13" font-weight="600" fill="#e2e8f0">UI Layer · Orb · Chat · Settings</text>
    <text x="420" y="420" text-anchor="middle" font-size="11" fill="#94a3b8">animations · message rendering</text>

    <!-- Personas -->
    <rect x="270" y="455" width="300" height="80" rx="8" fill="#1e293b" stroke="#a78bfa"/>
    <text x="420" y="478" text-anchor="middle" font-size="13" font-weight="600" fill="#e2e8f0">Persona Selector</text>
    <g font-size="11" fill="#cbd5e1">
      <text x="305" y="502">• General</text>
      <text x="395" y="502">• Email</text>
      <text x="475" y="502">• Calendar</text>
      <text x="305" y="522">• Assistant</text>
      <text x="395" y="522">• Sales / Support / Research</text>
    </g>

    <!-- State -->
    <rect x="270" y="555" width="300" height="55" rx="8" fill="#1e293b" stroke="#a78bfa"/>
    <text x="420" y="578" text-anchor="middle" font-size="13" font-weight="600" fill="#e2e8f0">Local State (in-memory)</text>
    <text x="420" y="596" text-anchor="middle" font-size="11" fill="#94a3b8">msgs · convId · persona · audio</text>

    <!-- Audio playback -->
    <rect x="270" y="630" width="300" height="60" rx="8" fill="#1e293b" stroke="#a78bfa"/>
    <text x="420" y="655" text-anchor="middle" font-size="13" font-weight="600" fill="#e2e8f0">🔊 Audio Playback</text>
    <text x="420" y="675" text-anchor="middle" font-size="11" fill="#94a3b8">HTMLAudioElement · iOS unlock</text>

    <text x="420" y="730" text-anchor="middle" font-size="11" fill="#64748b" font-style="italic">All API keys live server-side — none in the browser</text>
  </g>

  <!-- =================== CLOUDFLARE WORKER =================== -->
  <g>
    <rect x="640" y="140" width="360" height="620" rx="14" fill="#1c1917" stroke="#f97316" stroke-width="2"/>
    <text x="820" y="170" text-anchor="middle" font-size="16" font-weight="700" fill="#fdba74">☁️ Cloudflare Worker · Proxy</text>
    <text x="820" y="190" text-anchor="middle" font-size="11" fill="#94a3b8">ariaproxy.nihharksonee.workers.dev</text>

    <rect x="670" y="215" width="300" height="50" rx="8" fill="#292524" stroke="#f97316"/>
    <text x="820" y="240" text-anchor="middle" font-size="13" font-weight="600" fill="#fed7aa">Route Handler · CORS · Auth</text>
    <text x="820" y="256" text-anchor="middle" font-size="10" fill="#a8a29e">session token validation</text>

    <!-- Endpoints -->
    <rect x="670" y="285" width="300" height="46" rx="6" fill="#292524" stroke="#f97316" stroke-width="1"/>
    <text x="685" y="305" font-size="12" font-weight="600" fill="#fed7aa">POST /chat</text>
    <text x="685" y="322" font-size="10" fill="#a8a29e">forwards prompt + history → Groq</text>

    <rect x="670" y="340" width="300" height="46" rx="6" fill="#292524" stroke="#f97316" stroke-width="1"/>
    <text x="685" y="360" font-size="12" font-weight="600" fill="#fed7aa">POST /tts</text>
    <text x="685" y="377" font-size="10" fill="#a8a29e">streams ElevenLabs audio/mpeg back</text>

    <rect x="670" y="395" width="300" height="46" rx="6" fill="#292524" stroke="#f97316" stroke-width="1"/>
    <text x="685" y="415" font-size="12" font-weight="600" fill="#fed7aa">GET /auth/* · /connect · /disconnect</text>
    <text x="685" y="432" font-size="10" fill="#a8a29e">OAuth (Google · Microsoft) + tokens</text>

    <rect x="670" y="450" width="300" height="46" rx="6" fill="#292524" stroke="#f97316" stroke-width="1"/>
    <text x="685" y="470" font-size="12" font-weight="600" fill="#fed7aa">POST /analyze-email</text>
    <text x="685" y="487" font-size="10" fill="#a8a29e">structured JSON extraction via LLM</text>

    <rect x="670" y="505" width="300" height="46" rx="6" fill="#292524" stroke="#f97316" stroke-width="1"/>
    <text x="685" y="525" font-size="12" font-weight="600" fill="#fed7aa">GET /health · /tts/quota · /title</text>
    <text x="685" y="542" font-size="10" fill="#a8a29e">status checks + conversation titler</text>

    <rect x="670" y="585" width="300" height="155" rx="8" fill="#0c0a09" stroke="#f97316" stroke-dasharray="4 3"/>
    <text x="820" y="608" text-anchor="middle" font-size="12" font-weight="700" fill="#fdba74">Why a proxy?</text>
    <text x="685" y="630" font-size="11" fill="#d6d3d1">• Hides Groq + ElevenLabs API keys</text>
    <text x="685" y="650" font-size="11" fill="#d6d3d1">• Adds rate-limit / quota guard</text>
    <text x="685" y="670" font-size="11" fill="#d6d3d1">• Manages OAuth callback flow</text>
    <text x="685" y="690" font-size="11" fill="#d6d3d1">• Runs on Cloudflare edge — low latency</text>
    <text x="685" y="710" font-size="11" fill="#d6d3d1">• Single origin → no CORS pain</text>
    <text x="685" y="730" font-size="11" fill="#d6d3d1">• Lets the frontend stay 100% static</text>
  </g>

  <!-- =================== AI / VOICE =================== -->
  <g>
    <rect x="1040" y="140" width="320" height="290" rx="14" fill="#022c22" stroke="#10b981" stroke-width="2"/>
    <text x="1200" y="170" text-anchor="middle" font-size="16" font-weight="700" fill="#6ee7b7">🧠 AI &amp; Voice Services</text>

    <rect x="1070" y="195" width="260" height="90" rx="10" fill="#064e3b" stroke="#10b981"/>
    <text x="1200" y="222" text-anchor="middle" font-size="14" font-weight="700" fill="#d1fae5">Groq LLM API</text>
    <text x="1200" y="244" text-anchor="middle" font-size="12" fill="#a7f3d0">Llama 3.3 (instruction-tuned)</text>
    <text x="1200" y="264" text-anchor="middle" font-size="11" fill="#86efac">low-latency inference · streaming</text>

    <rect x="1070" y="300" width="260" height="110" rx="10" fill="#064e3b" stroke="#10b981"/>
    <text x="1200" y="327" text-anchor="middle" font-size="14" font-weight="700" fill="#d1fae5">ElevenLabs TTS</text>
    <text x="1200" y="349" text-anchor="middle" font-size="12" fill="#a7f3d0">Bella · Rachel · Adam · 10 voices</text>
    <text x="1200" y="369" text-anchor="middle" font-size="11" fill="#86efac">audio/mpeg · adjustable speed</text>
    <text x="1200" y="389" text-anchor="middle" font-size="11" fill="#86efac">monthly quota tracked via /tts/quota</text>
  </g>

  <!-- =================== INTEGRATIONS =================== -->
  <g>
    <rect x="1040" y="450" width="320" height="310" rx="14" fill="#172554" stroke="#60a5fa" stroke-width="2"/>
    <text x="1200" y="480" text-anchor="middle" font-size="16" font-weight="700" fill="#bfdbfe">🔌 App Integrations</text>
    <text x="1200" y="498" text-anchor="middle" font-size="11" fill="#94a3b8">OAuth · API tokens · webhooks</text>

    <g font-size="12" fill="#dbeafe">
      <rect x="1065" y="515" width="135" height="38" rx="6" fill="#1e3a8a" stroke="#60a5fa"/>
      <text x="1132" y="540" text-anchor="middle">📧 Gmail (OAuth)</text>

      <rect x="1210" y="515" width="135" height="38" rx="6" fill="#1e3a8a" stroke="#60a5fa"/>
      <text x="1277" y="540" text-anchor="middle">📅 Calendar</text>

      <rect x="1065" y="563" width="135" height="38" rx="6" fill="#1e3a8a" stroke="#60a5fa"/>
      <text x="1132" y="588" text-anchor="middle">💼 Outlook</text>

      <rect x="1210" y="563" width="135" height="38" rx="6" fill="#1e3a8a" stroke="#60a5fa"/>
      <text x="1277" y="588" text-anchor="middle">💬 Slack (token)</text>

      <rect x="1065" y="611" width="135" height="38" rx="6" fill="#1e3a8a" stroke="#60a5fa"/>
      <text x="1132" y="636" text-anchor="middle">🎮 Discord (hook)</text>

      <rect x="1210" y="611" width="135" height="38" rx="6" fill="#1e3a8a" stroke="#60a5fa"/>
      <text x="1277" y="636" text-anchor="middle">📝 Notion</text>

      <rect x="1065" y="659" width="135" height="38" rx="6" fill="#1e3a8a" stroke="#60a5fa"/>
      <text x="1132" y="684" text-anchor="middle">🗃️ Airtable</text>

      <rect x="1210" y="659" width="135" height="38" rx="6" fill="#1e3a8a" stroke="#60a5fa"/>
      <text x="1277" y="684" text-anchor="middle">⚙️ n8n flows</text>
    </g>

    <text x="1200" y="725" text-anchor="middle" font-size="10" fill="#94a3b8" font-style="italic">connections stored per-session on the Worker</text>
    <text x="1200" y="742" text-anchor="middle" font-size="10" fill="#94a3b8" font-style="italic">automation-ready: webhook → n8n → action</text>
  </g>

  <!-- =================== CONNECTIONS =================== -->
  <!-- User <-> Browser -->
  <line x1="175" y1="430" x2="265" y2="245" stroke="#38bdf8" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="195" y="320" font-size="10" fill="#7dd3fc">speaks</text>

  <line x1="265" y1="660" x2="175" y2="475" stroke="#38bdf8" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="180" y="580" font-size="10" fill="#7dd3fc">replies</text>

  <!-- Browser -> Worker -->
  <line x1="575" y1="405" x2="665" y2="305" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <text x="585" y="345" font-size="10" fill="#c4b5fd">/chat</text>

  <line x1="575" y1="660" x2="665" y2="360" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <text x="585" y="540" font-size="10" fill="#c4b5fd">/tts</text>

  <line x1="575" y1="500" x2="665" y2="415" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <text x="585" y="450" font-size="10" fill="#c4b5fd">/auth · /connect</text>

  <!-- Worker -> Groq -->
  <line x1="975" y1="305" x2="1065" y2="240" stroke="#10b981" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="990" y="265" font-size="10" fill="#6ee7b7">prompt</text>

  <line x1="975" y1="475" x2="1065" y2="245" stroke="#10b981" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrowGreen)"/>

  <!-- Worker -> ElevenLabs -->
  <line x1="975" y1="360" x2="1065" y2="350" stroke="#10b981" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="990" y="345" font-size="10" fill="#6ee7b7">text → audio</text>

  <!-- Worker -> Apps -->
  <line x1="975" y1="420" x2="1065" y2="535" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="990" y="490" font-size="10" fill="#bfdbfe">OAuth / actions</text>

  <!-- Footer / pipeline -->
  <g>
    <rect x="40" y="800" width="1320" height="70" rx="10" fill="#020617" stroke="#334155"/>
    <text x="60" y="828" font-size="13" font-weight="700" fill="#f1f5f9">End-to-end pipeline:</text>
    <text x="60" y="852" font-size="13" fill="#cbd5e1">
      🎙️ Voice  →  📝 Web Speech (STT)  →  ☁️ Cloudflare Worker  →  🧠 Groq Llama 3.3  →  🔊 ElevenLabs TTS  →  🔈 Browser playback
    </text>
  </g>
</svg>
